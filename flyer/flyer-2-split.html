<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realty Dept. - Flyer Design 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500;1,700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @page { size: 210mm 148mm; margin: 0; }

  body {
    width: 210mm;
    height: 148mm;
    font-family: 'Inter', sans-serif;
    background: #000;
    color: #fff;
    overflow: hidden;
  }

  .flyer {
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr;
  }

  /* --- Left panel: text + logo --- */
  .left {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 1.3rem 1.4rem;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .logo img {
    width: 5rem;
    height: auto;
    object-fit: contain;
  }

  .brand {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 0.48rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.45;
  }

  .headline {
    padding-right: 0.5rem;
  }

  .headline h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 400;
    font-style: italic;
    font-size: 1.75rem;
    line-height: 1.1;
    letter-spacing: 0.01em;
    margin-bottom: 0.55rem;
  }

  .headline .subtitle {
    font-weight: 300;
    font-size: 0.42rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    opacity: 0.55;
    line-height: 1.7;
  }

  .footer-left {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding-top: 0.6rem;
    border-top: 1px solid rgba(255,255,255,0.1);
  }

  .cta-btn {
    display: inline-block;
    background: #fff;
    color: #000;
    font-family: 'Inter', sans-serif;
    font-size: 0.38rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    padding: 0.45rem 1rem;
    border-radius: 2px;
    text-decoration: none;
  }

  .contact {
    text-align: right;
    font-size: 0.33rem;
    font-weight: 300;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    opacity: 0.5;
    line-height: 1.8;
  }

  /* --- Right panel: image grid --- */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 3px;
    padding: 3px;
  }

  .grid-item {
    position: relative;
    overflow: hidden;
    border-radius: 4px;
  }

  .grid-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .grid-item .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to top,
      rgba(0,0,0,0.75) 0%,
      rgba(0,0,0,0.1) 50%,
      rgba(0,0,0,0.05) 100%
    );
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 0.5rem;
  }

  .grid-item h3 {
    font-family: 'Playfair Display', serif;
    font-weight: 400;
    font-style: italic;
    font-size: 0.52rem;
    margin-bottom: 0.1rem;
  }

  .grid-item p {
    font-size: 0.32rem;
    font-weight: 300;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.7;
  }
</style>
</head>
<body>
<div class="flyer">

  <div class="left">

    <div class="top-bar">
      <div class="brand">LumiereMotionLabs</div>
      <div class="logo">
        <img src="realty-dept-logo.jpg" alt="Realty Dept.">
      </div>
    </div>

    <div class="headline">
      <h1>Spaces Reimagined<br>Through Light</h1>
      <p class="subtitle">Cinematic visualization for<br>modern real estate</p>
    </div>

    <div class="footer-left">
      <a href="#" class="cta-btn">Get in Touch</a>
      <div class="contact">
        lumieremotionlabs.com<br>
        @lumiere.motionlab
      </div>
    </div>

  </div>

  <div class="grid">
    <div class="grid-item">
      <img src="still-staging.jpg" alt="Room staging">
      <div class="overlay">
        <h3>Room Restyling</h3>
        <p>Virtual staging</p>
      </div>
    </div>
    <div class="grid-item">
      <img src="still-office.jpg" alt="Office transform">
      <div class="overlay">
        <h3>Built for the Future</h3>
        <p>Commercial spaces</p>
      </div>
    </div>
    <div class="grid-item">
      <img src="still-lights.jpg" alt="Atmosphere">
      <div class="overlay">
        <h3>Atmosphere</h3>
        <p>Lighting design</p>
      </div>
    </div>
    <div class="grid-item">
      <img src="still-bridge.jpg" alt="Cityscape">
      <div class="overlay">
        <h3>Cinematic Views</h3>
        <p>Aerial & exterior</p>
      </div>
    </div>
  </div>

</div>
</body>
</html>
