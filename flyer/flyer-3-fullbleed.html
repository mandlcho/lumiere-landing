<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realty Dept. - Flyer Design 3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500;1,700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @page { size: 210mm 148mm; margin: 0; }

  body {
    width: 210mm;
    height: 148mm;
    font-family: 'Inter', sans-serif;
    background: #000;
    color: #fff;
    overflow: hidden;
  }

  .flyer {
    width: 100%;
    height: 100%;
    position: relative;
  }

  /* --- Full bleed background --- */
  .bg {
    position: absolute;
    inset: 0;
  }

  .bg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .bg-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to right,
      rgba(0,0,0,0.75) 0%,
      rgba(0,0,0,0.3) 30%,
      rgba(0,0,0,0.1) 55%,
      rgba(0,0,0,0.2) 80%,
      rgba(0,0,0,0.6) 100%
    );
  }

  .bg-overlay-b {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to top,
      rgba(0,0,0,0.6) 0%,
      transparent 30%
    );
  }

  /* --- Content layered on top --- */
  .content {
    position: absolute;
    inset: 0;
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 1.3rem 1.5rem;
  }

  /* Top bar */
  .top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .brand {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 0.5rem;
    letter-spacing: 0.04em;
    opacity: 0.7;
  }

  .logo img {
    width: 5.2rem;
    height: auto;
    object-fit: contain;
  }

  /* Left-aligned text */
  .center {
    max-width: 50%;
  }

  .center h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 400;
    font-style: italic;
    font-size: 2.1rem;
    line-height: 1.08;
    letter-spacing: 0.01em;
    margin-bottom: 0.5rem;
  }

  .center p {
    font-weight: 300;
    font-size: 0.42rem;
    letter-spacing: 0.06em;
    opacity: 0.8;
    line-height: 1.75;
  }

  /* Bottom bar */
  .bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .contact {
    font-size: 0.34rem;
    font-weight: 300;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.5;
    line-height: 1.7;
  }

  .cta-btn {
    display: inline-block;
    background: #fff;
    color: #000;
    font-family: 'Inter', sans-serif;
    font-size: 0.36rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    padding: 0.42rem 0.9rem;
    border-radius: 2px;
    text-decoration: none;
  }
</style>
</head>
<body>
<div class="flyer">

  <div class="bg">
    <img src="still-staging.jpg" alt="Styled interior">
    <div class="bg-overlay"></div>
    <div class="bg-overlay-b"></div>
  </div>

  <div class="content">

    <div class="top">
      <div class="brand">LumiereMotionLabs</div>
      <div class="logo">
        <img src="realty-dept-logo.jpg" alt="Realty Dept.">
      </div>
    </div>

    <div class="center">
      <h1>Where Vision<br>Meets Space</h1>
      <p>Cinematic visualization, virtual staging, and atmosphere design that transforms how properties are experienced.</p>
    </div>

    <div class="bottom">
      <div class="contact">
        lumieremotionlabs.com<br>
        mandl.cho@icloud.com
      </div>
      <a href="#" class="cta-btn">Book a Session</a>
    </div>

  </div>

</div>
</body>
</html>
